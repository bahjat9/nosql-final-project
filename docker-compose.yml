version: '3.8'

services:
  neo4j:
    image: neo4j:5
    container_name: movie_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password123
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  app:
    build: .
    container_name: movie_api
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password123
      - PORT=3000
    volumes:
      - .:/app
    depends_on:
      - neo4j
    restart: unless-stopped

volumes:
  neo4j_data:

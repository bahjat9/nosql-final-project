version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: movie_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: movie_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  neo4j:
    image: neo4j:latest
    container_name: movie_neo4j
    ports:
      - "7474:7474" 
      - "7687:7687" 
    environment:
      - NEO4J_AUTH=neo4j/password123 
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

volumes:
  mongodb_data:
  neo4j_data: